apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-ui-sa
  namespace: travail-en-france
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-api-service-sa
  namespace: travail-en-france
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-ingestion-service-sa
  namespace: travail-en-france
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: travail-en-france
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-config-reader
  namespace: travail-en-france
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["app-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-ui-config-reader
  namespace: travail-en-france
subjects:
  - kind: ServiceAccount
    name: web-ui-sa
    namespace: travail-en-france
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-config-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-api-config-reader
  namespace: travail-en-france
subjects:
  - kind: ServiceAccount
    name: job-api-service-sa
    namespace: travail-en-france
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-config-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-ingestion-config-reader
  namespace: travail-en-france
subjects:
  - kind: ServiceAccount
    name: job-ingestion-service-sa
    namespace: travail-en-france
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-config-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-config-reader
  namespace: travail-en-france
subjects:
  - kind: ServiceAccount
    name: postgres-sa
    namespace: travail-en-france
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-config-reader
